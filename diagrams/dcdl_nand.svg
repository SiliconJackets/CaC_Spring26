<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 240">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 5; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- Input A (bypass line) -->
  <text x="5" y="55" class="sig">A</text>
  <line x1="18" y1="51" x2="45" y2="51" stroke="#333" stroke-width="1.5"/>
  <!-- A runs along the top as bypass -->
  <line x1="45" y1="51" x2="560" y2="51" stroke="#333" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="565" y="48" font-size="9" fill="#666">bypass (in0)</text>

  <!-- Cell 3 -->
  <rect class="block" x="70" y="90" width="110" height="70"/>
  <text x="85" y="110" font-size="11" font-weight="600">cell3</text>
  <text x="85" y="128" font-size="10">ctl=Q[3]</text>
  <text x="85" y="144" font-size="9" fill="#666">in1=0, in0=A</text>

  <!-- in1 = 0 for cell3 -->
  <text x="42" y="130" font-size="9" fill="#666">0</text>
  <line x1="52" y1="126" x2="68" y2="126" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- A down to cell3 -->
  <line x1="100" y1="51" x2="100" y2="88" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q[3] -->
  <line x1="125" y1="200" x2="125" y2="162" stroke="#0066aa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="110" y="215" class="sig" font-size="10">Q[3]</text>

  <!-- Cell 2 -->
  <rect class="block" x="210" y="90" width="110" height="70"/>
  <text x="225" y="110" font-size="11" font-weight="600">cell2</text>
  <text x="225" y="128" font-size="10">ctl=Q[2]</text>

  <!-- cell3 to cell2 -->
  <line x1="180" y1="125" x2="208" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="182" y="118" font-size="9" fill="#666">s3</text>

  <!-- A down to cell2 -->
  <line x1="240" y1="51" x2="240" y2="88" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q[2] -->
  <line x1="265" y1="200" x2="265" y2="162" stroke="#0066aa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="250" y="215" class="sig" font-size="10">Q[2]</text>

  <!-- Cell 1 -->
  <rect class="block" x="350" y="90" width="110" height="70"/>
  <text x="365" y="110" font-size="11" font-weight="600">cell1</text>
  <text x="365" y="128" font-size="10">ctl=Q[1]</text>

  <!-- cell2 to cell1 -->
  <line x1="320" y1="125" x2="348" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="118" font-size="9" fill="#666">s2</text>

  <!-- A down to cell1 -->
  <line x1="380" y1="51" x2="380" y2="88" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q[1] -->
  <line x1="405" y1="200" x2="405" y2="162" stroke="#0066aa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="390" y="215" class="sig" font-size="10">Q[1]</text>

  <!-- Cell 0 -->
  <rect class="block" x="490" y="90" width="110" height="70"/>
  <text x="505" y="110" font-size="11" font-weight="600">cell0</text>
  <text x="505" y="128" font-size="10">ctl=Q[0]</text>

  <!-- cell1 to cell0 -->
  <line x1="460" y1="125" x2="488" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="462" y="118" font-size="9" fill="#666">s1</text>

  <!-- A down to cell0 -->
  <line x1="520" y1="51" x2="520" y2="88" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q[0] -->
  <line x1="545" y1="200" x2="545" y2="162" stroke="#0066aa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="530" y="215" class="sig" font-size="10">Q[0]</text>

  <!-- Output Y -->
  <line x1="600" y1="125" x2="640" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="643" y="129" class="sig" font-weight="600">Y</text>
  <text x="612" y="118" font-size="9" fill="#666">s0</text>
</svg>