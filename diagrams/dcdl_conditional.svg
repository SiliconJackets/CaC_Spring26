<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 230">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 5; }
      rect.inv { fill: #e8eef5; stroke: #555; stroke-width: 1; rx: 3; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- Input -->
  <text x="5" y="50" class="sig">A</text>
  <line x1="18" y1="46" x2="38" y2="46" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Single inverter chain (4 inverters, 4 taps) -->
  <rect class="inv" x="45" y="33" width="45" height="28"/>
  <text x="55" y="51" font-size="10">inv1</text>
  <line x1="90" y1="46" x2="110" y2="46" stroke="#333" stroke-width="1"/>
  <text x="95" y="76" class="sig" font-size="10">tap0</text>
  <circle cx="105" cy="46" r="3" fill="#0066aa"/>

  <rect class="inv" x="115" y="33" width="45" height="28"/>
  <text x="125" y="51" font-size="10">inv2</text>
  <line x1="160" y1="46" x2="180" y2="46" stroke="#333" stroke-width="1"/>
  <text x="165" y="76" class="sig" font-size="10">tap1</text>
  <circle cx="175" cy="46" r="3" fill="#0066aa"/>

  <rect class="inv" x="185" y="33" width="45" height="28"/>
  <text x="195" y="51" font-size="10">inv3</text>
  <line x1="230" y1="46" x2="250" y2="46" stroke="#333" stroke-width="1"/>
  <text x="235" y="76" class="sig" font-size="10">tap2</text>
  <circle cx="245" cy="46" r="3" fill="#0066aa"/>

  <rect class="inv" x="255" y="33" width="45" height="28"/>
  <text x="265" y="51" font-size="10">inv4</text>
  <line x1="300" y1="46" x2="310" y2="46" stroke="#333" stroke-width="1"/>
  <text x="305" y="76" class="sig" font-size="10">tap3</text>
  <circle cx="310" cy="46" r="3" fill="#0066aa"/>

  <!-- Mux tree (same as inverter-based) -->
  <line x1="105" y1="46" x2="105" y2="115" stroke="#333" stroke-width="1"/>
  <line x1="175" y1="46" x2="175" y2="115" stroke="#333" stroke-width="1"/>
  <line x1="245" y1="46" x2="245" y2="115" stroke="#333" stroke-width="1"/>
  <line x1="310" y1="46" x2="310" y2="115" stroke="#333" stroke-width="1"/>

  <rect class="block" x="115" y="115" width="55" height="30"/>
  <text x="126" y="134" font-size="10">mux0</text>
  <line x1="105" y1="125" x2="113" y2="125" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="175" y1="125" x2="172" y2="125" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <rect class="block" x="255" y="115" width="55" height="30"/>
  <text x="266" y="134" font-size="10">mux1</text>
  <line x1="245" y1="125" x2="253" y2="125" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="125" x2="312" y2="125" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="200" y="143" class="sig" font-size="9">Q[0]</text>

  <!-- Final mux -->
  <rect class="block" x="195" y="160" width="55" height="30"/>
  <text x="206" y="179" font-size="10">mux2</text>
  <line x1="142" y1="145" x2="142" y2="175" stroke="#333" stroke-width="1"/>
  <line x1="142" y1="175" x2="193" y2="175" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="282" y1="145" x2="282" y2="175" stroke="#333" stroke-width="1"/>
  <line x1="282" y1="175" x2="252" y2="175" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="258" y="174" class="sig" font-size="9">Q[1]</text>

  <!-- XNOR -->
  <line x1="250" y1="175" x2="370" y2="175" stroke="#333" stroke-width="1.5"/>
  <rect class="block" x="380" y="155" width="80" height="40" style="fill:#fff0f0;"/>
  <text x="393" y="172" font-size="11" font-weight="600">XNOR</text>
  <text x="393" y="186" class="sig" font-size="10">b = Q[1]</text>

  <!-- Q[1] to XNOR -->
  <line x1="350" y1="210" x2="420" y2="210" stroke="#0066aa" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="420" y1="210" x2="420" y2="197" stroke="#0066aa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="350" y="224" class="sig" font-size="10">Q[1]</text>

  <!-- Output Y -->
  <line x1="460" y1="175" x2="510" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="518" y="179" class="sig" font-weight="600">Y</text>
</svg>