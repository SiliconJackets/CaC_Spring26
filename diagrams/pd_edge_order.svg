<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- clk_in input -->
  <text x="10" y="80" class="sig">clk_in</text>
  <line x1="65" y1="76" x2="110" y2="76" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UP latch -->
  <rect class="block" x="120" y="50" width="160" height="55"/>
  <text x="142" y="72" font-size="12">Set on posedge clk_in</text>
  <text x="142" y="90" font-size="12">Clear when down=1</text>

  <!-- UP output -->
  <line x1="280" y1="76" x2="350" y2="76" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="80" class="sig" font-size="13" font-weight="600">up</text>

  <!-- clk_out input -->
  <text x="10" y="200" class="sig">clk_out</text>
  <line x1="65" y1="196" x2="110" y2="196" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DOWN latch -->
  <rect class="block" x="120" y="170" width="160" height="55"/>
  <text x="142" y="192" font-size="12">Set on posedge clk_out</text>
  <text x="142" y="210" font-size="12">Clear when up=1</text>

  <!-- DOWN output -->
  <line x1="280" y1="196" x2="350" y2="196" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="200" class="sig" font-size="13" font-weight="600">down</text>

  <!-- Cross-coupling arrows -->
  <path d="M 350 86 Q 400 86, 400 136 Q 400 170, 300 170 L 280 170" stroke="#c44" stroke-width="1" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <path d="M 350 186 Q 410 186, 410 136 Q 410 105, 300 105 L 280 105" stroke="#c44" stroke-width="1" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="408" y="140" font-size="10" fill="#c44">cross-check</text>
</svg>