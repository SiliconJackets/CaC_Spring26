<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- inputs -->
  <text x="10" y="100" class="sig">up/down</text>
  <line x1="70" y1="96" x2="120" y2="96" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mode Select -->
  <rect class="block" x="130" y="70" width="120" height="55" style="fill:#f0f8f0;"/>
  <text x="145" y="92" font-size="12" font-weight="600">Mode Select</text>
  <text x="145" y="110" font-size="10" fill="#666">coarse → fine</text>

  <!-- Coarse counter -->
  <rect class="block" x="310" y="30" width="120" height="50"/>
  <text x="322" y="52" font-size="12">Coarse Counter</text>
  <text x="322" y="68" font-size="10" fill="#666">3-bit, +/-1</text>

  <!-- Fine counter -->
  <rect class="block" x="310" y="130" width="120" height="50"/>
  <text x="328" y="152" font-size="12">Fine Counter</text>
  <text x="328" y="168" font-size="10" fill="#666">3-bit, +/-1</text>

  <!-- mode to counters -->
  <line x1="250" y1="85" x2="308" y2="55" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="110" x2="308" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Concatenation -->
  <rect class="block" x="470" y="70" width="90" height="80" style="fill:#fff8f0;"/>
  <text x="480" y="100" font-size="12">Concat</text>
  <text x="480" y="118" class="sig">{C, F}</text>
  <text x="480" y="136" class="sig">= ctrl</text>

  <!-- counters to concat -->
  <line x1="430" y1="55" x2="468" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="155" x2="468" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- output -->
  <line x1="560" y1="110" x2="590" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="593" y="114" class="sig">ctrl</text>

  <!-- Quiet counter at bottom -->
  <rect class="block" x="130" y="180" width="120" height="45"/>
  <text x="145" y="200" font-size="12">Quiet Counter</text>
  <text x="145" y="216" font-size="10" fill="#666">triggers mode switch</text>
  <line x1="190" y1="180" x2="190" y2="127" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
</svg>