<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 5; }
      rect.inv { fill: #e8eef5; stroke: #555; stroke-width: 1; rx: 3; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- Inverter chain -->
  <rect class="inv" x="60" y="40" width="40" height="25"/>
  <text x="68" y="57" font-size="9">inv0</text>
  <line x1="100" y1="52" x2="110" y2="52" stroke="#333" stroke-width="1"/>

  <rect class="inv" x="115" y="40" width="40" height="25"/>
  <text x="123" y="57" font-size="9">inv1</text>
  <line x1="155" y1="52" x2="165" y2="52" stroke="#333" stroke-width="1"/>

  <rect class="inv" x="170" y="40" width="40" height="25"/>
  <text x="178" y="57" font-size="9">inv2</text>
  <line x1="210" y1="52" x2="220" y2="52" stroke="#333" stroke-width="1"/>
  <circle cx="215" cy="52" r="3" fill="#c44"/>
  <text x="208" y="36" font-size="9" fill="#c44">n2</text>

  <rect class="inv" x="225" y="40" width="40" height="25"/>
  <text x="233" y="57" font-size="9">inv3</text>
  <line x1="265" y1="52" x2="275" y2="52" stroke="#333" stroke-width="1"/>

  <rect class="inv" x="280" y="40" width="40" height="25"/>
  <text x="288" y="57" font-size="9">inv4</text>
  <line x1="320" y1="52" x2="330" y2="52" stroke="#333" stroke-width="1"/>
  <circle cx="325" cy="52" r="3" fill="#c44"/>
  <text x="318" y="36" font-size="9" fill="#c44">n4</text>

  <rect class="inv" x="335" y="40" width="40" height="25"/>
  <text x="343" y="57" font-size="9">inv5</text>
  <line x1="375" y1="52" x2="385" y2="52" stroke="#333" stroke-width="1"/>

  <rect class="inv" x="390" y="40" width="40" height="25"/>
  <text x="398" y="57" font-size="9">inv6</text>
  <line x1="430" y1="52" x2="440" y2="52" stroke="#333" stroke-width="1"/>
  <circle cx="435" cy="52" r="3" fill="#c44"/>
  <text x="428" y="36" font-size="9" fill="#c44">n6</text>

  <rect class="inv" x="445" y="40" width="40" height="25"/>
  <text x="453" y="57" font-size="9">inv7</text>
  <line x1="485" y1="52" x2="495" y2="52" stroke="#333" stroke-width="1"/>

  <rect class="inv" x="500" y="40" width="40" height="25"/>
  <text x="508" y="57" font-size="9">inv8</text>
  <circle cx="545" cy="52" r="3" fill="#c44"/>
  <text x="545" y="36" font-size="9" fill="#c44">n8</text>
  <line x1="540" y1="52" x2="550" y2="52" stroke="#333" stroke-width="1"/>

  <!-- Tap lines down to mux -->
  <line x1="215" y1="52" x2="215" y2="120" stroke="#c44" stroke-width="1"/>
  <line x1="325" y1="52" x2="325" y2="120" stroke="#c44" stroke-width="1"/>
  <line x1="435" y1="52" x2="435" y2="120" stroke="#c44" stroke-width="1"/>
  <line x1="545" y1="52" x2="545" y2="120" stroke="#c44" stroke-width="1"/>

  <!-- Mux -->
  <rect class="block" x="195" y="120" width="370" height="45" style="fill:#fff8f0;"/>
  <text x="320" y="138" font-size="11" text-anchor="middle">4:1 MUX (case on sel[1:0])</text>
  <text x="210" y="156" font-size="9">00→n2</text>
  <text x="310" y="156" font-size="9">01→n4</text>
  <text x="410" y="156" font-size="9">10→n6</text>
  <text x="510" y="156" font-size="9">11→n8</text>

  <!-- sel input -->
  <text x="100" y="148" class="sig">sel[1:0]</text>
  <line x1="160" y1="144" x2="193" y2="144" stroke="#0066aa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mux output = clk_out -->
  <line x1="380" y1="165" x2="380" y2="200" stroke="#333" stroke-width="1.5"/>
  <text x="390" y="195" class="sig" font-weight="600">clk_out</text>

  <!-- Feedback loop back to inv0 -->
  <line x1="380" y1="200" x2="30" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="200" x2="30" y2="52" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="52" x2="58" y2="52" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="35" y="135" font-size="10" fill="#666">feedback</text>
</svg>