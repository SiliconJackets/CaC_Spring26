<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- inputs -->
  <text x="10" y="75" class="sig">up/down</text>
  <line x1="70" y1="71" x2="110" y2="71" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Quiet Counter -->
  <rect class="block" x="60" y="150" width="130" height="55"/>
  <text x="78" y="174" font-size="12">Quiet Counter</text>
  <text x="78" y="192" font-size="10" fill="#666">counts idle cycles</text>

  <!-- Mode FSM -->
  <rect class="block" x="120" y="40" width="140" height="65" style="fill:#f0f8f0;"/>
  <text x="138" y="62" font-size="12" font-weight="600">Mode Select</text>
  <text x="138" y="80" font-size="11">ACQUIRE: step=4</text>
  <text x="138" y="94" font-size="11">TRACK:   step=1</text>

  <!-- quiet counter to mode -->
  <line x1="190" y1="150" x2="190" y2="107" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="196" y="136" font-size="10" fill="#666">threshold</text>

  <!-- mode to adder -->
  <line x1="260" y1="72" x2="320" y2="72" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="268" y="64" class="sig" font-size="10">step_size</text>

  <!-- Adder/Sub -->
  <rect class="block" x="330" y="45" width="110" height="55"/>
  <text x="345" y="68" font-size="12">ctrl +/- step</text>
  <text x="345" y="86" font-size="12">with saturation</text>

  <!-- output -->
  <line x1="440" y1="72" x2="500" y2="72" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="508" y="76" class="sig">ctrl</text>
</svg>