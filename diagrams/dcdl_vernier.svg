<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 5; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- Labels -->
  <text x="5" y="55" font-size="13" font-weight="600">Slow Chain</text>
  <text x="5" y="75" font-size="10" fill="#666">(buf_1, high delay)</text>
  <text x="5" y="175" font-size="13" font-weight="600">Fast Chain</text>
  <text x="5" y="195" font-size="10" fill="#666">(buf_4, low delay)</text>

  <!-- Input A -->
  <text x="105" y="22" class="sig">A</text>
  <line x1="115" y1="26" x2="115" y2="42" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Slow chain stages -->
  <rect class="block" x="100" y="45" width="70" height="35" style="fill:#ffeedd;"/>
  <text x="114" y="67" font-size="10">buf_1</text>
  <rect class="block" x="210" y="45" width="70" height="35" style="fill:#ffeedd;"/>
  <text x="224" y="67" font-size="10">buf_1</text>
  <rect class="block" x="320" y="45" width="70" height="35" style="fill:#ffeedd;"/>
  <text x="334" y="67" font-size="10">buf_1</text>
  <text x="420" y="67" font-size="14" fill="#666">...</text>
  <rect class="block" x="460" y="45" width="70" height="35" style="fill:#ffeedd;"/>
  <text x="474" y="67" font-size="10">buf_1</text>

  <!-- Slow chain arrows -->
  <line x1="170" y1="62" x2="208" y2="62" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="62" x2="318" y2="62" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="62" x2="410" y2="62" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="62" x2="458" y2="62" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fast chain stages -->
  <rect class="block" x="100" y="160" width="70" height="35" style="fill:#ddeeff;"/>
  <text x="114" y="182" font-size="10">buf_4</text>
  <rect class="block" x="210" y="160" width="70" height="35" style="fill:#ddeeff;"/>
  <text x="224" y="182" font-size="10">buf_4</text>
  <rect class="block" x="320" y="160" width="70" height="35" style="fill:#ddeeff;"/>
  <text x="334" y="182" font-size="10">buf_4</text>
  <text x="420" y="182" font-size="14" fill="#666">...</text>
  <rect class="block" x="460" y="160" width="70" height="35" style="fill:#ddeeff;"/>
  <text x="474" y="182" font-size="10">buf_4</text>

  <!-- Fast chain arrows -->
  <line x1="170" y1="177" x2="208" y2="177" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="177" x2="318" y2="177" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="177" x2="410" y2="177" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="177" x2="458" y2="177" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Crossover muxes (slow→fast) -->
  <rect class="block" x="130" y="100" width="40" height="28" style="fill:#f5f0ff;"/>
  <text x="136" y="118" font-size="9">mux</text>
  <line x1="150" y1="80" x2="150" y2="98" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="150" y1="128" x2="150" y2="158" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <rect class="block" x="240" y="100" width="40" height="28" style="fill:#f5f0ff;"/>
  <text x="246" y="118" font-size="9">mux</text>
  <line x1="260" y1="80" x2="260" y2="98" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="260" y1="128" x2="260" y2="158" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <rect class="block" x="350" y="100" width="40" height="28" style="fill:#f5f0ff;"/>
  <text x="356" y="118" font-size="9">mux</text>
  <line x1="370" y1="80" x2="370" y2="98" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="370" y1="128" x2="370" y2="158" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <rect class="block" x="490" y="100" width="40" height="28" style="fill:#f5f0ff;"/>
  <text x="496" y="118" font-size="9">mux</text>
  <line x1="510" y1="80" x2="510" y2="98" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="128" x2="510" y2="158" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q labels -->
  <text x="130" y="244" class="sig" font-size="9">Q[0]</text>
  <line x1="142" y1="235" x2="142" y2="130" stroke="#0066aa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="240" y="244" class="sig" font-size="9">Q[1]</text>
  <line x1="252" y1="235" x2="252" y2="130" stroke="#0066aa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="350" y="244" class="sig" font-size="9">Q[2]</text>
  <line x1="362" y1="235" x2="362" y2="130" stroke="#0066aa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="490" y="244" class="sig" font-size="9">Q[N-1]</text>
  <line x1="502" y1="235" x2="502" y2="130" stroke="#0066aa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- Output Y from fast chain -->
  <line x1="530" y1="177" x2="590" y2="177" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="598" y="181" class="sig" font-weight="600">Y</text>

  <!-- fast_net[0] = 0 -->
  <text x="75" y="182" font-size="9" fill="#666">0</text>
  <line x1="87" y1="178" x2="98" y2="178" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
</svg>