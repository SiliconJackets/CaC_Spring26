<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- inputs -->
  <text x="10" y="80" class="sig">up/down</text>
  <line x1="70" y1="76" x2="110" y2="76" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Direction Tracker -->
  <rect class="block" x="120" y="50" width="140" height="55"/>
  <text x="135" y="72" font-size="12" font-weight="600">Direction Tracker</text>
  <text x="135" y="90" font-size="10" fill="#666">same_dir_count [3:0]</text>

  <!-- Step Size Lookup -->
  <rect class="block" x="120" y="140" width="140" height="65" style="fill:#f0f8f0;"/>
  <text x="132" y="162" font-size="12" font-weight="600">Step Lookup</text>
  <text x="132" y="178" font-size="10">cnt &lt; 4  → step=1</text>
  <text x="132" y="192" font-size="10">cnt &lt; 8  → step=2</text>
  <text x="132" y="204" font-size="10">cnt >= 8 → step=4</text>

  <!-- tracker to lookup -->
  <line x1="190" y1="105" x2="190" y2="138" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- lookup to adder -->
  <line x1="260" y1="172" x2="330" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="268" y="128" class="sig" font-size="10">step_size</text>

  <!-- Adder -->
  <rect class="block" x="340" y="65" width="120" height="55"/>
  <text x="355" y="88" font-size="12">ctrl +/- step</text>
  <text x="355" y="106" font-size="12">with saturation</text>

  <!-- output -->
  <line x1="460" y1="92" x2="520" y2="92" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="528" y="96" class="sig">ctrl</text>

  <!-- direction resets -->
  <text x="280" y="60" font-size="10" fill="#c44">dir change → reset count</text>
</svg>