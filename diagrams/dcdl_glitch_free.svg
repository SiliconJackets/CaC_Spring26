<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 5; }
      rect.inv { fill: #e8eef5; stroke: #555; stroke-width: 1; rx: 3; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- Input -->
  <text x="5" y="42" class="sig">A</text>
  <line x1="18" y1="38" x2="38" y2="38" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3-stage inverter chain -->
  <rect class="inv" x="45" y="25" width="40" height="28"/>
  <text x="53" y="43" font-size="10">inv1</text>
  <line x1="85" y1="38" x2="100" y2="38" stroke="#333" stroke-width="1"/>
  <rect class="inv" x="108" y="25" width="40" height="28"/>
  <text x="116" y="43" font-size="10">inv2</text>
  <line x1="148" y1="38" x2="163" y2="38" stroke="#333" stroke-width="1"/>
  <rect class="inv" x="170" y="25" width="40" height="28"/>
  <text x="178" y="43" font-size="10">inv3</text>

  <!-- tap labels -->
  <text x="32" y="16" class="sig" font-size="9">tap0</text>
  <text x="90" y="16" class="sig" font-size="9">tap1</text>
  <text x="152" y="16" class="sig" font-size="9">tap2</text>
  <text x="214" y="16" class="sig" font-size="9">tap3</text>

  <!-- Q input to one-hot decoder -->
  <text x="5" y="108" class="sig">Q[1:0]</text>
  <line x1="55" y1="104" x2="90" y2="104" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- One-hot decoder -->
  <rect class="block" x="100" y="85" width="100" height="40"/>
  <text x="108" y="102" font-size="11">One-Hot Decode</text>
  <text x="108" y="118" font-size="10" fill="#666">sel[3:0]</text>

  <!-- Register -->
  <line x1="200" y1="105" x2="230" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect class="block" x="240" y="85" width="80" height="40" style="fill:#f0f8f0;"/>
  <text x="250" y="102" font-size="11">Registered</text>
  <text x="250" y="118" font-size="10" fill="#666">sel_reg (clk)</text>

  <!-- Gated taps -->
  <line x1="320" y1="105" x2="360" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NAND gating block -->
  <rect class="block" x="370" y="30" width="100" height="115"/>
  <text x="378" y="50" font-size="11">Gated Taps</text>
  <text x="378" y="70" font-size="10">~tap0 NAND sel[0]</text>
  <text x="378" y="85" font-size="10">~tap1 NAND sel[1]</text>
  <text x="378" y="100" font-size="10">~tap2 NAND sel[2]</text>
  <text x="378" y="115" font-size="10">~tap3 NAND sel[3]</text>
  <text x="378" y="135" font-size="10" fill="#666">→ y0, y1, y2, y3</text>

  <!-- tap lines to gating -->
  <line x1="45" y1="38" x2="45" y2="65" stroke="#333" stroke-width="1"/>
  <line x1="45" y1="65" x2="368" y2="65" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="98" y1="38" x2="98" y2="80" stroke="#333" stroke-width="1"/>
  <line x1="98" y1="80" x2="368" y2="80" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="160" y1="38" x2="160" y2="95" stroke="#333" stroke-width="1"/>
  <line x1="160" y1="95" x2="368" y2="95" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="210" y1="38" x2="210" y2="110" stroke="#333" stroke-width="1"/>
  <line x1="210" y1="110" x2="368" y2="110" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- NAND tree -->
  <line x1="470" y1="85" x2="510" y2="85" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect class="block" x="520" y="60" width="70" height="50" style="fill:#fff8f0;"/>
  <text x="530" y="82" font-size="11">NAND</text>
  <text x="530" y="98" font-size="11">Tree</text>

  <!-- Output Y -->
  <line x1="590" y1="85" x2="620" y2="85" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="623" y="89" class="sig" font-weight="600">Y</text>
</svg>