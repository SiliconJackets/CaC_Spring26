<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- D Flip-Flop -->
  <rect class="block" x="150" y="40" width="100" height="110"/>
  <text x="185" y="70" font-weight="600" text-anchor="middle">D FF</text>

  <!-- D input (clk_out) -->
  <text x="10" y="80" class="sig">clk_out</text>
  <line x1="70" y1="76" x2="148" y2="76" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="155" y="86" font-size="11">D</text>

  <!-- CLK input (clk_in) -->
  <text x="10" y="130" class="sig">clk_in</text>
  <line x1="60" y1="126" x2="148" y2="126" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="155" y="136" font-size="11">CLK</text>
  <!-- clock triangle -->
  <polygon points="150,120 150,132 158,126" fill="none" stroke="#555" stroke-width="1"/>

  <!-- Q output -->
  <line x1="250" y1="90" x2="290" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="244" y="86" font-size="11">Q</text>

  <!-- Decode block -->
  <rect class="block" x="300" y="55" width="100" height="75"/>
  <text x="315" y="82" font-size="11">Q=0 → up=1</text>
  <text x="315" y="100" font-size="11">Q=1 → down=1</text>

  <!-- Outputs -->
  <line x1="400" y1="78" x2="440" y2="78" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="448" y="82" class="sig" font-weight="600">up</text>
  <line x1="400" y1="105" x2="440" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="448" y="109" class="sig" font-weight="600">down</text>
</svg>