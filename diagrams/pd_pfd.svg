<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- FF1 (UP) -->
  <rect class="block" x="130" y="30" width="110" height="80"/>
  <text x="160" y="58" font-weight="600">FF1</text>
  <text x="150" y="78" font-size="11">D = 1</text>
  <text x="150" y="94" font-size="11">async CLR</text>

  <!-- clk_in to FF1 CLK -->
  <text x="10" y="62" class="sig">clk_in</text>
  <line x1="65" y1="58" x2="128" y2="58" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FF1 Q output (up) -->
  <line x1="240" y1="60" x2="340" y2="60" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="64" class="sig" font-weight="600">up</text>

  <!-- FF2 (DOWN) -->
  <rect class="block" x="130" y="160" width="110" height="80"/>
  <text x="160" y="188" font-weight="600">FF2</text>
  <text x="150" y="208" font-size="11">D = 1</text>
  <text x="150" y="224" font-size="11">async CLR</text>

  <!-- clk_out to FF2 CLK -->
  <text x="10" y="192" class="sig">clk_out</text>
  <line x1="65" y1="188" x2="128" y2="188" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FF2 Q output (down) -->
  <line x1="240" y1="190" x2="340" y2="190" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="194" class="sig" font-weight="600">down</text>

  <!-- AND gate for reset -->
  <rect class="block" x="300" y="110" width="70" height="40" style="fill:#fff0f0;"/>
  <text x="316" y="135" font-size="12" font-weight="600">AND</text>

  <!-- Lines from outputs to AND -->
  <line x1="290" y1="60" x2="290" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="290" y1="120" x2="298" y2="120" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="290" y1="190" x2="290" y2="140" stroke="#333" stroke-width="1"/>
  <line x1="290" y1="140" x2="298" y2="140" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- AND output to CLR of both FFs -->
  <line x1="370" y1="130" x2="400" y2="130" stroke="#c44" stroke-width="1.5"/>
  <text x="405" y="134" font-size="11" fill="#c44">CLR</text>
  <path d="M 400 130 Q 430 130, 430 95 L 430 95 Q 430 30, 240 55" stroke="#c44" stroke-width="1" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <path d="M 400 130 Q 430 130, 430 165 L 430 165 Q 430 240, 240 210" stroke="#c44" stroke-width="1" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
</svg>