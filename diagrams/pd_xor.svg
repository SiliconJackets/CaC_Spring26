<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #333; }
      rect.block { fill: #f0f4f8; stroke: #555; stroke-width: 1.5; rx: 6; }
      .sig { font-family: monospace; font-size: 11px; fill: #0066aa; }
    </style>
  </defs>

  <!-- XOR gate -->
  <rect class="block" x="100" y="50" width="80" height="60"/>
  <text x="124" y="86" font-weight="600">XOR</text>

  <!-- clk_in to XOR -->
  <text x="10" y="68" class="sig">clk_in</text>
  <line x1="60" y1="64" x2="98" y2="64" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- clk_out to XOR -->
  <text x="10" y="100" class="sig">clk_out</text>
  <line x1="65" y1="96" x2="98" y2="96" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- XOR to DFF -->
  <line x1="180" y1="80" x2="230" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="185" y="72" class="sig" font-size="10">phase_error</text>

  <!-- DFF -->
  <rect class="block" x="240" y="50" width="100" height="80"/>
  <text x="268" y="76" font-weight="600">D FF</text>
  <text x="252" y="96" font-size="11">D = phase_error</text>
  <text x="252" y="112" font-size="11">CLK = clk_in</text>

  <!-- clk_in to DFF CLK -->
  <line x1="60" y1="64" x2="60" y2="155" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="155" x2="260" y2="155" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="155" x2="260" y2="132" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DFF to decode -->
  <line x1="340" y1="80" x2="380" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decode block -->
  <rect class="block" x="390" y="45" width="100" height="75"/>
  <text x="398" y="72" font-size="11">error=1, out=0</text>
  <text x="405" y="86" font-size="11"> → up = 1</text>
  <text x="398" y="102" font-size="11">error=1, out=1</text>
  <text x="405" y="116" font-size="11"> → down = 1</text>

  <!-- outputs -->
  <line x1="490" y1="70" x2="520" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="525" y="74" class="sig" font-weight="600">up</text>
  <line x1="490" y1="105" x2="520" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="525" y="109" class="sig" font-weight="600">down</text>
</svg>